<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TRI AI Saturdays League — weekly team leaderboard from Skills Boost activity."
    />
    <title>Saturdays League | TRI AI</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("tri-saturdays-league-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <p style="margin: 2rem; font-family: 'Plus Jakarta Sans', Inter, system-ui, sans-serif; color: var(--text, #e5e5e5)">
        Loading…
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
